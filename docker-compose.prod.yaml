  # --- APP: RTC Signaling Service ---
services:
  careergraph-rtc:
    image: ${DOCKER_IMAGE_REPO_RTC:-thinz/careergraph-rtc}:${IMAGE_TAG_RTC:-latest}
    pull_policy: always
    container_name: careergraph-rtc
    restart: unless-stopped
    ports:
      - "${RTC_PORT_EXPOSE:-4000}:${RTC_PORT_CONTAINER:-4000}"
    env_file:
      - .env
    environment:
      PORT: ${RTC_PORT_CONTAINER:-4000}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-}
      CORS_ORIGINS: ${RTC_CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rtc.rule=Host(`${RTC_DOMAIN:-rtc.thinz.io.vn}`)"
      - "traefik.http.routers.rtc.entrypoints=websecure"
      - "traefik.http.routers.rtc.tls.certresolver=le"
      - "traefik.http.services.rtc.loadbalancer.server.port=${RTC_PORT_CONTAINER:-4000}"
    depends_on:
      careergraph-api:
        condition: service_started
    networks:
      - careergraph-network
      - proxy

networks:
  careergraph-network:
    driver: bridge
  proxy:
    external: true