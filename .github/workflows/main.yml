name: CareerGraph RTC CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: careergraph-rtc-main
  cancel-in-progress: true

env:
  IMAGE_NAME: careergraph-rtc

jobs:
  build-and-push:
    name: Build, Validate, Push Image
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
      image_repo: ${{ steps.image_vars.outputs.image_repo }}
      docker_image: ${{ steps.image_vars.outputs.docker_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate startup script
        run: node -e "console.log('RTC build validation passed')"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Resolve image coordinates
        id: image_vars
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          IMAGE_REPO="${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "docker_image=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_vars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.image_vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-vps:
    name: Deploy RTC to VPS
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment: production

    steps:
      - name: Validate SSH deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          RTC_DOCKER_COMPOSE_PROD: ${{ secrets.RTC_DOCKER_COMPOSE_PROD }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi

          if [ -z "$VPS_USER" ]; then
            echo "Missing secret: VPS_USER"
            exit 1
          fi

          if [ -z "$VPS_SSH_PRIVATE_KEY" ]; then
            echo "Missing SSH private key secret. Set VPS_SSH_PRIVATE_KEY or VPS_SSH_KEY."
            exit 1
          fi

          if [ -z "$RTC_DOCKER_COMPOSE_PROD" ]; then
            echo "Missing secret: RTC_DOCKER_COMPOSE_PROD"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          RTC_DOCKER_COMPOSE_PROD: ${{ secrets.RTC_DOCKER_COMPOSE_PROD }}
          APP_ENV_PROD: ${{ secrets.APP_ENV_PROD }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          IMAGE_REPO_RTC: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME_RTC }}
          IMAGE_TAG_RTC: ${{ needs['build-and-push'].outputs.image_tag }}
          RTC_HEALTHCHECK_URL: ${{ vars.RTC_HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
          envs: RTC_DOCKER_COMPOSE_PROD,APP_ENV_PROD,DOCKER_HUB_USERNAME,DOCKER_HUB_ACCESS_TOKEN,VPS_APP_DIR,IMAGE_REPO_RTC,IMAGE_TAG_RTC,RTC_HEALTHCHECK_URL
          script_stop: true
          script: |
            set -e

            log_step() {
              echo "[deploy-rtc][$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $1"
            }

            log_step "Starting RTC deployment script"

            if [ -z "$VPS_APP_DIR" ]; then
              echo "VPS_APP_DIR is empty. Set this secret to your compose project path on VPS."
              exit 1
            fi

            if [ -z "$RTC_DOCKER_COMPOSE_PROD" ]; then
              echo "RTC_DOCKER_COMPOSE_PROD is empty. Add docker compose content to this GitHub Secret."
              exit 1
            fi

            cd "$VPS_APP_DIR"
            log_step "Changed directory to $VPS_APP_DIR"

            COMPOSE_FILE_TMP="$(mktemp docker-compose-rtc-XXXXXX.yaml)"
            ENV_FILE_TMP="$(mktemp env-rtc-XXXXXX.list)"
            log_step "Created temporary deploy files"

            cleanup() {
              log_step "Cleaning up temporary deploy files"
              rm -f "$COMPOSE_FILE_TMP" "$ENV_FILE_TMP"
            }
            trap cleanup EXIT

            if [ -z "$APP_ENV_PROD" ]; then
              echo "APP_ENV_PROD is empty. Add production env content to GitHub Secret APP_ENV_PROD."
              exit 1
            fi

            if [ -z "$IMAGE_REPO_RTC" ] || [ -z "$IMAGE_TAG_RTC" ]; then
              echo "IMAGE_REPO_RTC or IMAGE_TAG_RTC is empty. Build output is invalid."
              exit 1
            fi

            printf "%s\n" "$RTC_DOCKER_COMPOSE_PROD" > "$COMPOSE_FILE_TMP"
            log_step "Wrote compose content to temporary file"

            {
              printf "%s\n" "$APP_ENV_PROD"
              printf "DOCKER_IMAGE_REPO_RTC=%s\n" "$IMAGE_REPO_RTC"
              printf "IMAGE_TAG_RTC=%s\n" "$IMAGE_TAG_RTC"
            } > "$ENV_FILE_TMP"
            log_step "Wrote runtime environment to temporary env file"

            set -a
            . "$ENV_FILE_TMP"
            set +a
            log_step "Loaded runtime environment variables"

            log_step "Logging in to Docker registry"
            echo "$DOCKER_HUB_ACCESS_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
            log_step "Docker login succeeded"

            log_step "Pulling RTC image"
            docker compose -f "$COMPOSE_FILE_TMP" pull careergraph-rtc
            log_step "Pull completed"

            log_step "Starting RTC container"
            docker compose -f "$COMPOSE_FILE_TMP" up -d careergraph-rtc
            log_step "Container start command completed"

            RTC_HOST_PORT=$(docker compose -f "$COMPOSE_FILE_TMP" port careergraph-rtc "${RTC_PORT_CONTAINER:-4000}" | tail -n 1 | awk -F: '{print $NF}')
            if [ -z "$RTC_HOST_PORT" ]; then
              echo "Cannot resolve published port for careergraph-rtc."
              docker compose -f "$COMPOSE_FILE_TMP" ps careergraph-rtc || true
              exit 1
            fi
            log_step "Resolved published RTC port: $RTC_HOST_PORT"
            FALLBACK_RTC_HEALTHCHECK_URL="http://127.0.0.1:${RTC_HOST_PORT}/health"

            EFFECTIVE_RTC_HEALTHCHECK_URL="$RTC_HEALTHCHECK_URL"
            if [ -z "$EFFECTIVE_RTC_HEALTHCHECK_URL" ]; then
              EFFECTIVE_RTC_HEALTHCHECK_URL="$FALLBACK_RTC_HEALTHCHECK_URL"
            fi

            log_step "Starting RTC health checks"
            echo "[deploy-rtc] Primary RTC health endpoint: $EFFECTIVE_RTC_HEALTHCHECK_URL"
            for i in $(seq 1 36); do
              if curl -fsS "$EFFECTIVE_RTC_HEALTHCHECK_URL" > /dev/null; then
                log_step "RTC healthcheck succeeded"
                log_step "Removing RTC image tags from VPS"
                docker image rm "$IMAGE_REPO_RTC:$IMAGE_TAG_RTC" || true
                docker image rm "$IMAGE_REPO_RTC:latest" || true
                log_step "RTC deployment completed successfully"
                exit 0
              fi
              if [ $((i % 6)) -eq 0 ]; then
                log_step "RTC healthcheck still pending after $((i * 5)) seconds"
              fi
              sleep 5
            done

            if [ "$EFFECTIVE_RTC_HEALTHCHECK_URL" != "$FALLBACK_RTC_HEALTHCHECK_URL" ]; then
              log_step "Primary RTC health URL failed. Retrying with fallback URL: $FALLBACK_RTC_HEALTHCHECK_URL"
              for i in $(seq 1 24); do
                if curl -fsS "$FALLBACK_RTC_HEALTHCHECK_URL" > /dev/null; then
                  log_step "RTC fallback healthcheck succeeded"
                  log_step "Removing RTC image tags from VPS"
                  docker image rm "$IMAGE_REPO_RTC:$IMAGE_TAG_RTC" || true
                  docker image rm "$IMAGE_REPO_RTC:latest" || true
                  log_step "RTC deployment completed successfully"
                  exit 0
                fi
                if [ $((i % 6)) -eq 0 ]; then
                  log_step "RTC fallback healthcheck still pending after $((i * 5)) seconds"
                fi
                sleep 5
              done
            fi

            log_step "RTC health checks failed. Dumping recent logs"
            echo "RTC health check failed after deploy. Recent logs:"
            docker compose -f "$COMPOSE_FILE_TMP" logs --tail=200 careergraph-rtc || true
            exit 1
